<!doctype html>

<html>
  <head>
    <base target="_top">
    <title>Juuksevärvi tuvastus</title>
    <script>
      let player = null, c = null, g = null, g2 = null, s1 = null;

```
  function start() {
    player = document.getElementById("v1");
    c = document.getElementById("c1");
    g = c.getContext("2d");
    g2 = document.getElementById("c2").getContext("2d");
    s1 = document.getElementById("s1");

    navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
      player.srcObject = stream;
    });

    setInterval(capture, 500);
  }

  function getHairColor(r, g, b) {
    let avg = (r + g + b) / 3;

    // tume → brünett
    if (avg < 70) return "brünett";

    let redRatio = r / (g + b + 1);
    let warmth = r - b;

    // punapea (parandatud)
    if (redRatio > 1.25 && warmth > 40 && r > 100) {
      return "punapea";
    }

    let maxDiff = Math.max(
      Math.abs(r - g),
      Math.abs(r - b),
      Math.abs(g - b)
    );

    // blond
    if (avg > 150 && maxDiff < 60) {
      return "blond";
    }

    return "brünett";
  }

  function capture() {
    g.drawImage(player, 0, 0, c.width, c.height);

    // Näo umbkaudne asukoht (vajadusel muuda)
    let faceX = 110;
    let faceY = 90;
    let faceW = 100;
    let faceH = 100;

    // SUUREM juukse ala (stabiilsem)
    let hairW = 60;
    let hairH = 60;
    let hairX = faceX - hairW - 10;
    let hairY = faceY + faceH / 2 - hairH / 2;

    // piirid
    hairX = Math.max(0, hairX);
    hairY = Math.max(0, hairY);
    hairW = Math.min(c.width - hairX, hairW);
    hairH = Math.min(c.height - hairY, hairH);

    // joonista kast
    g.strokeStyle = "red";
    g.lineWidth = 2;
    g.strokeRect(hairX, hairY, hairW, hairH);

    let d = g.getImageData(hairX, hairY, hairW, hairH);
    g2.putImageData(d, 0, 0);

    let data = d.data;
    let rSum = 0, gSum = 0, bSum = 0;
    let count = 0;

    for (let i = 0; i < data.length; i += 4) {
      let r = data[i];
      let g = data[i + 1];
      let b = data[i + 2];

      // ignoreeri liiga tumedad pikslid (varjud)
      if (r < 30 && g < 30 && b < 30) continue;

      rSum += r;
      gSum += g;
      bSum += b;
      count++;
    }

    if (count === 0) return;

    let r = rSum / count;
    let gVal = gSum / count;
    let b = bSum / count;

    let color = getHairColor(r, gVal, b);

    s1.innerHTML = 
      `RGB: ${Math.round(r)}, ${Math.round(gVal)}, ${Math.round(b)} → <b>${color}</b>`;
  }
</script>
```

  </head>

  <body onload="start()">
    <video id="v1" autoplay style="width: 45%"></video>
    <canvas id="c1" width="320" height="240" style="width: 45%"></canvas><br />
    <canvas id="c2" width="60" height="60"></canvas><br />
    <span id="s1"></span>
  </body>
</html>
